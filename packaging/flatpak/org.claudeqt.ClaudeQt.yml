app-id: org.claudeqt.ClaudeQt
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: claudeqt
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  # cmark-gfm (not in KDE runtime)
  - name: cmark-gfm
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMARK_TESTS=OFF
      - -DCMARK_SHARED=ON
      - -DCMARK_STATIC=OFF
    sources:
      - type: archive
        url: https://github.com/github/cmark-gfm/archive/refs/tags/0.29.0.gfm.13.tar.gz
        sha256: 5abc61798ebd9de5660bc076443c07abad2b8d15dbc11094a3a79644b8ad243a

  # ClaudeQt
  - name: claudeqt
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DAPP_SYSTEM_INTEGRATION=ON
      - -DAPP_BUILD_REMOTE=OFF
      - -DBUILD_TESTS=OFF
    sources:
      - type: dir
        path: .
