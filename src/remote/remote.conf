# claudeqt-remote configuration file.
#
# This file is referenced by the claudeqt-remote.service unit's
# ExecStart= line. It is a dpkg conffile — edits made here
# survive package upgrades.
#
# STATUS: the claudeqt-remote binary is currently a watchdog-only
# stub that ignores argv entirely. Every setting in this file is a
# no-op today. The future daemon will begin parsing this file when
# the real JSON-RPC / TLS / worker-pool path lands. See
# /usr/share/doc/claudeqt-remote/README.Debian for the cross-host
# deployment model the daemon is being built to.
#
# All settings below are commented out. Uncomment and edit
# once the real daemon ships.

# ---- Network ----
# bind_addr = 127.0.0.1
# bind_port = 49428          # IANA dynamic range

# ---- TLS ----
# Paths below match the Ed25519 cert generated by the package's
# postinst under /etc/claudeqt/certs/.
# tls_cert = /etc/claudeqt/certs/server.crt
# tls_key  = /etc/claudeqt/certs/server.key

# ---- Access control ----
# Additional pre-accept allowlist entries are set via systemd
# drop-ins under /etc/systemd/system/claudeqt-remote.service.d/;
# this key is for daemon-level post-accept filtering.
# allowlist = 127.0.0.1/32

# ---- Workspace ----
# Per-session scratch trees materialize under this root.
# workspace_root = /var/lib/claudeqt/workspace
